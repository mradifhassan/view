<!doctype html>
<html lang="en"> 
 <head> 
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>Isosceles Triangle</title> 
  <link rel="stylesheet" href="new.css"> 
 </head> 
 <body> 
<svg width="600" height="400">
  <!-- Draw the first isosceles right triangle ACB -->
  <line x1="100" y1="300" x2="300" y2="300" stroke="black" stroke-width="2" /> <!-- Base AB -->
  <line x1="100" y1="300" x2="100" y2="100" stroke="black" stroke-width="2" /> <!-- Vertical AC -->
  <line x1="100" y1="100" x2="300" y2="300" stroke="black" stroke-width="2" /> <!-- Hypotenuse CB -->

  <!-- Draw the second isosceles right triangle ACD to the left of ACB -->
  <line x1="100" y1="300" x2="-100" y2="300" stroke="black" stroke-width="2" /> <!-- Base AD -->
  <line x1="100" y1="300" x2="100" y2="100" stroke="black" stroke-width="2" /> <!-- Vertical AC -->
  <line x1="100" y1="100" x2="-100" y2="300" stroke="black" stroke-width="2" /> <!-- Hypotenuse CD -->

  <!-- Add labels -->
  <text x="95" y="320" font-family="Arial" font-size="20" fill="black">A</text>
  <text x="305" y="320" font-family="Arial" font-size="20" fill="black">B</text>
  <text x="110" y="110" font-family="Arial" font-size="20" fill="black">C</text>
  <text x="-110" y="320" font-family="Arial" font-size="20" fill="black">D</text>
</svg>
 </body>
</html>
